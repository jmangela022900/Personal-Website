<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#222;
font-family:Arial;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:#222;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>

// ✅ SET YOUR ACCOUNT
localStorage.setItem("userEmail","jmangelaperocho@gmail.com");
localStorage.setItem("userPass","jayem022900");

function login(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

let storedEmail = localStorage.getItem("userEmail");
let storedPass = localStorage.getItem("userPass");

if(email === storedEmail && pass === storedPass){
localStorage.setItem("loggedIn","true");
window.location.href = "home.html";
}else{
alert("Wrong email or password!");
}

}

</script>

</body>
</html>
