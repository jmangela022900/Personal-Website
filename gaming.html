<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming | JM Website</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
background:url("bg.jpg") no-repeat center center/cover;
min-height:100vh;
}

/* TOP BAR */
.topbar{
background:#222;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
}

/* MENU */
.menu{
font-size:28px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0px 10px rgba(0,0,0,0.3);
z-index:1000;
}

.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

/* CONTAINER */
.container{
background:rgba(255,255,255,0.9);
max-width:1000px;
margin:50px auto;
padding:35px;
border-radius:12px;
}

/* TITLE */
.title{
font-size:26px;
margin-bottom:30px;
text-align:center;
}

/* GAME GRID */
.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* GAME CARD */
.game-card{
background:#e6e6e6;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

.game-card img{
width:100%;
border-radius:8px;
}

.game-card h3{
margin-top:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</div>

<!-- TOPBAR -->
<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Gaming</div>
</div>

<!-- CONTENT -->
<div class="container">

<h2 class="title">MY GAMES</h2>

<div class="games">

<div class="game-card">
<img src="game1.jpg">
<h3>Mobile Legends</h3>
</div>

<div class="game-card">
<img src="game2.jpg">
<h3>Call of Duty</h3>
</div>

<div class="game-card">
<img src="game3.jpg">
<h3>Minecraft</h3>
</div>

</div>

</div>

<script>

function toggleMenu(){

let menu=document.getElementById("sidebar");

if(menu.style.left==="0px"){
menu.style.left="-250px";
}else{
menu.style.left="0px";
}

}

</script>

</body>
</html>
