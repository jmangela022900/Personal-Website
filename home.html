<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | JM Personal Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
min-height:100vh;
}

/* NAVBAR */
.navbar{
background:#222;
color:white;
display:flex;
align-items:center;
padding:12px 20px;
}

.menu{
font-size:30px;
cursor:pointer;
margin-right:15px;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-220px;
top:0;
width:220px;
height:100%;
background:#ccc;
padding-top:60px;
transition:0.3s;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:black;
font-weight:bold;
}

.sidebar a:hover{
background:#bbb;
}

.container{
background:rgba(255,255,255,0.9);
margin:40px;
padding:40px;
border-radius:10px;
display:flex;
align-items:center;
gap:40px;
}

.container img{
width:200px;
border-radius:10px;
}

.text h1{
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<a href="home.html">HOME</a>
<a href="gallery.html">GALLERY</a>
<a href="hobbies.html">HOBBIES</a>
<a href="contact.html">CONTACT</a>
</div>

<div class="navbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Home</div>
</div>

<div class="container">

<img src="jm.jpg">

<div class="text">
<h1>Hello! I’m Jm Angela M. Perocho</h1>
<p>
Welcome to my personal website. I love exploring new things and expressing creativity.
</p>
</div>

</div>

<script>

function toggleMenu(){

let menu=document.getElementById("sidebar");

if(menu.style.left==="0px"){
menu.style.left="-220px";
}else{
menu.style.left="0px";
}

}

</script>

</body>
</html>
