
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | JM Personal Website</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* BODY BACKGROUND */
body{
    background-image: url("bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
}

/* TOP BAR */
.topbar{
    background:#222;
    color:white;
    padding:10px 20px;
    font-size:14px;
}

/* NAVIGATION */
.nav{
    background:#eee;
    padding:15px 30px;
    display:flex;
    justify-content:flex-end;
    gap:15px;
    flex-wrap: wrap; /* prevents breaking on small screens */
}

.nav a{
    text-decoration:none;
    background:#d9d9d9;
    padding:8px 18px;
    border-radius:20px;
    color:black;
    font-size:14px;
    transition: 0.3s;
}

.nav a:hover{
    background:#bbb;
}

/* MAIN CONTENT */
.container{
    background:rgba(233,233,233,0.9);
    padding:60px;
    display:flex;
    align-items:center;
    gap:40px;
    min-height:70vh;
    margin:40px;
    border-radius:10px;
    flex-wrap: wrap; /* responsive */
}

/* IMAGE */
.container img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:8px;
}

/* TEXT */
.text h1{
    font-size:24px;
    margin-bottom:15px;
}

.text p{
    max-width:400px;
    line-height:1.6;
    color:#333;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    Home
</div>

<!-- NAVIGATION -->
<div class="nav">
    <a href="home.html">Home</a>
    <a href="hobbies.html">Hobbies</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
</div>

<!-- MAIN CONTENT -->
<div class="container">

   <img src="jm.jpg" alt="JM Photo">

    <div class="text">
        <h1>Hello! I’m Jm Angela M. Perocho</h1>
        <p>
            Welcome to my personal website. I love exploring new things and expressing creativity.
        </p>
    </div>

</div>

</body>
</html>
