<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | JM Personal Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
min-height:100vh;
}

.topbar{
background:#003366;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
}

.menu{
font-size:30px;
cursor:pointer;
}

.logout-btn{
margin-left:auto;
padding:6px 12px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0px 10px rgba(0,0,0,0.3);
z-index:1000;
}

.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

.container{
background:rgba(255,255,255,0.9);
margin:40px;
padding:40px;
border-radius:10px;
display:flex;
align-items:center;
gap:40px;
flex-wrap:wrap;
}

.container img{
width:200px;
height:200px;
object-fit:cover;
border-radius:10px;
}

.text h1{
font-size:26px;
margin-bottom:15px;
}

</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "login.html";
}
</script>

<div class="sidebar" id="sidebar">
<a href="index.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
<a href="other-information.html">Other Information</a>
</div>

<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Home</div>

<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<img src="jm2.jpg" alt="JM Photo">

<div class="text">
<h1>Hello! I’m Jm Angela M. Perocho</h1>
<p>Welcome to my personal website.</p>
</div>

</div>

<script>

function toggleMenu(){
let menu = document.getElementById("sidebar");

if(menu.style.left === "0px"){
menu.style.left = "-250px";
}else{
menu.style.left = "0px";
}
}

function logout(){
localStorage.removeItem("loggedIn");
window.location.href = "login.html";
}

</script>

</body>
</html>
