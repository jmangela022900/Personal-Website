```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | JM Personal Website</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
min-height:100vh;
}

/* TOP BAR */
.topbar{
background:#222;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
}

/* MENU ICON */
.menu{
font-size:30px;
cursor:pointer;
}

/* SIDEBAR MENU */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0px 10px rgba(0,0,0,0.3);
}

/* SIDEBAR LINKS */
.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

/* CONTENT CARD */
.container{
background:rgba(255,255,255,0.9);
margin:40px;
padding:40px;
border-radius:10px;
display:flex;
align-items:center;
gap:40px;
flex-wrap:wrap;
}

/* IMAGE */
.container img{
width:200px;
height:200px;
object-fit:cover;
border-radius:10px;
}

/* TEXT */
.text h1{
font-size:26px;
margin-bottom:15px;
}

.text p{
max-width:400px;
line-height:1.6;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<a href="home.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>

</div>

<!-- TOP BAR -->
<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Home</div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

<img src="jm.jpg" alt="JM Photo">

<div class="text">
<h1>Hello! I’m Jm Angela M. Perocho</h1>

<p>
Welcome to my personal website. I love exploring new things and expressing creativity.
</p>

</div>

</div>

<script>

/* SIDEBAR MENU */
function toggleMenu(){

let menu = document.getElementById("sidebar");

if(menu.style.left === "0px"){
menu.style.left = "-250px";
}else{
menu.style.left = "0px";
}

}

</script>

</body>
</html>
