<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | JM Personal Website</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
min-height:100vh;
}

/* TOP BAR */
.topbar{
background:#1f1f1f;
color:white;
padding:15px 20px;
display:flex;
align-items:center;
gap:15px;
font-size:18px;
}

/* MENU ICON */
.menu{
font-size:28px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-220px;
top:0;
width:220px;
height:100%;
background:#f2f2f2;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0 10px rgba(0,0,0,0.3);
}

/* SIDEBAR LINKS */
.sidebar a{
display:block;
padding:18px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

/* MAIN CARD */
.container{
background:#e9e9e9;
margin:60px 50px;
padding:40px;
border-radius:12px;
display:flex;
align-items:center;
gap:40px;
}

/* IMAGE */
.container img{
width:180px;
height:180px;
border-radius:12px;
object-fit:cover;
}

/* TEXT */
.text h1{
font-size:28px;
margin-bottom:15px;
}

.text p{
font-size:16px;
line-height:1.6;
max-width:500px;
}

/* MOBILE */
@media(max-width:768px){

.container{
flex-direction:column;
text-align:center;
}

.container img{
width:150px;
height:150px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</div>

<!-- TOP BAR -->
<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Home</div>
</div>

<!-- CONTENT -->
<div class="container">

<img src="jm.jpg" alt="JM Photo">

<div class="text">

<h1>Hello! I’m Jm Angela M. Perocho</h1>

<p>
Welcome to my personal website. I love exploring new things and expressing creativity.
</p>

</div>

</div>

<script>

function toggleMenu(){

let menu = document.getElementById("sidebar");

if(menu.style.left === "0px"){
menu.style.left = "-220px";
}else{
menu.style.left = "0px";
}

}

</script>

</body>
</html>
