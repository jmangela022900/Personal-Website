*{

}

/* FULL BACKGROUND */
body{
    background: url("bg.jpg") no-repeat center center fixed;

    min-height: 100vh;
}

/* LIGHT OVERLAY */
body::before{
    content:"";

    height:100%;
    background: rgba(0,0,0,0.2);
    z-index:-1;

/* TOP BAR */
.topbar{

}

/* NAVIGATION */
.nav{
    background:#eee;
    padding:15px 30px;
    display:flex;
    justify-content:flex-end;
    gap:15px;
    flex-wrap:wrap;

.nav a{
    text-decoration:none;
    background:#d9d9d9;
    padding:8px 18px;

    color:black;
    font-size:14px;

.nav a:hover{

/* HOBBIES GRID */
.hobbies{

}

/* HOBBY CARD */
.card{

    gap:15px;
    border-radius:8px;
    transition:0.3s;
}

.card:hover{

}

/* ICON */
.card img{

}

/* TEXT */
.card h3{

    margin-bottom:5px;
}

.card p{

}
