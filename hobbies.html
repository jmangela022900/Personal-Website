<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Hobbies | JM Website</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
background:url("bg.jpg") no-repeat center center fixed;
background-size:cover;
min-height:100vh;
}

/* LIGHT OVERLAY */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
z-index:-1;
}

/* TOP BAR */
.topbar{
background:#222;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
font-size:16px;
}

/* MENU ICON */
.menu{
font-size:28px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0px 10px rgba(0,0,0,0.3);
}

/* SIDEBAR LINKS */
.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

/* MAIN CONTENT BOX */
.container{
background:rgba(233,233,233,0.95);
padding:60px;
min-height:70vh;
margin:40px;
border-radius:10px;
}

/* TITLE */
.title{
font-size:24px;
margin-bottom:40px;
}

/* HOBBIES GRID */
.hobbies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

/* HOBBY CARD */
.card{
background:#dcdcdc;
padding:15px;
display:flex;
align-items:center;
gap:15px;
border-radius:8px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* ICON */
.card img{
width:45px;
}

/* TEXT */
.card h3{
font-size:14px;
margin-bottom:5px;
}

.card p{
font-size:12px;
color:#333;
}

</style>
</head>
