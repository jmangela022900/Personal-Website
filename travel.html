```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel | JM Website</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:url("bg.jpg") no-repeat center center/cover;
min-height:100vh;
}

.topbar{
background:#222;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
}

.menu{font-size:28px;cursor:pointer;}

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
}

.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.container{
background:rgba(255,255,255,0.9);
max-width:1000px;
margin:50px auto;
padding:35px;
border-radius:12px;
}

.title{text-align:center;margin-bottom:30px;}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{transform:scale(1.05);}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</div>

<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Travel</div>
</div>

<div class="container">

<h2 class="title">MY TRAVELS</h2>

<div class="gallery">
<img src="travel1.jpg">
<img src="travel2.jpg">
<img src="manila.jpg">
<img src="travel4.jpg">
<img src="travel5.jpg">
<img src="travel6.jpg">
</div>

</div>

<script>
function toggleMenu(){
let menu=document.getElementById("sidebar");
if(menu.style.left==="0px"){
menu.style.left="-250px";
}else{
menu.style.left="0px";
}
}
</script>

</body>
</html>
```
