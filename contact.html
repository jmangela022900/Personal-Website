<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | JM Website</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
background:url("bg.jpg") center/cover no-repeat;
min-height:100vh;
}

/* TOP BAR */
.topbar{
background:#222;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
}

/* MENU */
.menu{
font-size:28px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0px 10px rgba(0,0,0,0.3);
}

.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

/* CONTAINER */
.container{
background:rgba(255,255,255,0.9);
margin:40px;
padding:40px;
border-radius:10px;
}

/* TITLE */
.title{
font-size:24px;
margin-bottom:30px;
}

/* CONTACT GRID */
.contact-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* CONTACT CARD */
.card{
background:#e6e6e6;
padding:25px;
text-align:center;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* ICON */
.card img{
width:50px;
margin-bottom:15px;
}

/* TEXT */
.card h3{
margin-bottom:10px;
}

.card a{
text-decoration:none;
color:#333;
word-break:break-all;
}

.card a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</div>

<!-- TOP BAR -->
<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Contact</div>
</div>

<!-- CONTENT -->
<div class="container">

<h2 class="title">CONTACT ME</h2>

<div class="contact-grid">

<div class="card">
<img src="phone.png">
<h3>Phone</h3>
<p>09857879953</p>
</div>

<div class="card">
<img src="gmail.png">
<h3>Email</h3>
<a href="mailto:jmangela022900@gmail.com">jmangela022900@gmail.com</a>
</div>

<div class="card">
<img src="facebook.png">
<h3>Facebook</h3>
<a href="https://www.facebook.com/jay.em.373518" target="_blank">
Visit my Facebook
</a>
</div>

</div>

</div>

<script>

function toggleMenu(){

let menu = document.getElementById("sidebar");

if(menu.style.left === "0px"){
menu.style.left = "-250px";
}else{
menu.style.left = "0px";
}

}

</script>

</body>
</html>
