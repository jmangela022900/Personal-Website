<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | JM Website</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
background:url("bg.jpg") no-repeat center center/cover;
min-height:100vh;
}

/* TOP BAR */
.topbar{
background:#222;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
gap:15px;
}

/* MENU ICON */
.menu{
font-size:28px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#f0f0f0;
padding-top:60px;
transition:0.3s;
box-shadow:3px 0px 10px rgba(0,0,0,0.3);
z-index:1000;
}

.sidebar a{
display:block;
padding:16px;
text-decoration:none;
color:black;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.sidebar a:hover{
background:#ddd;
}

/* CONTAINER */
.container{
background:rgba(255,255,255,0.9);
max-width:1000px;
margin:50px auto;
padding:40px;
border-radius:10px;
}

/* TITLE */
.title{
font-size:26px;
margin-bottom:35px;
text-align:center;
}

/* CONTACT SECTION */
.contact-grid{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

/* CARD */
.card{
background:#e6e6e6;
width:260px;
padding:30px;
text-align:center;
border-radius:10px;
transition:0.3s;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.card:hover{
transform:translateY(-5px);
}

/* ICON */
.card img{
width:55px;
margin-bottom:15px;
}

/* TEXT */
.card h3{
margin-bottom:10px;
}

.card p{
color:#333;
}

.card a{
text-decoration:none;
color:#333;
word-break:break-word;
}

.card a:hover{
text-decoration:underline;
}

/* MOBILE */
@media(max-width:768px){

.container{
margin:25px;
padding:25px;
}

.card{
width:100%;
max-width:300px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="hobbies.html">Hobbies</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
<a href="Other information.html">Other-Information</a>
</div>

<!-- TOP BAR -->
<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>Contact</div>
</div>

<!-- CONTENT -->
<div class="container">

<h2 class="title">CONTACT ME</h2>

<div class="contact-grid">

<!-- PHONE -->
<div class="card">
<img src="phone.png" alt="Phone">
<h3>Phone</h3>
<p>
<a href="tel:09857879953">09857879953</a>
</p>
</div>

<!-- EMAIL -->
<div class="card">
<img src="gmail.png" alt="Email">
<h3>Email</h3>
<p>
<a href="mailto:jmangela022900@gmail.com">
jmangela022900@gmail.com
</a>
</p>
</div>

<!-- FACEBOOK -->
<div class="card">
<img src="facebook.png" alt="Facebook">
<h3>Facebook</h3>
<p>
<a href="https://www.facebook.com/jay.em.373518" target="_blank">
Visit my Facebook
</a>
</p>
</div>

<script>

/* SIDEBAR MENU */
function toggleMenu(){
let menu=document.getElementById("sidebar");

if(menu.style.left==="0px"){
menu.style.left="-250px";
}else{
menu.style.left="0px";
}
}

</script>

</body>
</html>
